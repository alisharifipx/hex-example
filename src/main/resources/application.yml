# in-memory H2 for the demo; swap the datasource block for a real DB with no code changes
spring:
  datasource:
    url: jdbc:h2:mem:privacypolicy;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update        # auto-create the schema from @Entity for the demo
    properties:
      hibernate:
        format_sql: true
    show-sql: true
  h2:
    console:
      enabled: true           # browse data at http://localhost:8080/h2-console
